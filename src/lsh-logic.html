<!-- Node-RED Registration Script -->
<script type="text/javascript">
  const validatePositiveNumber = (value) => {
    const numericValue = Number(value);
    return Number.isFinite(numericValue) && numericValue > 0;
  };

  const validateRequiredTrimmed = (value) => String(value || "").trim().length > 0;

  const validateTopicBase = (value) => {
    const normalized = String(value || "").trim();
    return normalized.length > 0 && normalized.endsWith("/");
  };

  function validateContextBackedKey(value, contextFieldName) {
    const contextValue = this[contextFieldName];
    if (contextValue === "none") {
      return true;
    }
    return validateRequiredTrimmed(value);
  }

  function validateExposeStateKey(value) {
    return validateContextBackedKey.call(this, value, "exposeStateContext");
  }

  function validateExportTopicsKey(value) {
    return validateContextBackedKey.call(this, value, "exportTopics");
  }

  function validateExposeConfigKey(value) {
    return validateContextBackedKey.call(this, value, "exposeConfigContext");
  }

  function validateDiscoveryPrefix(value) {
    const isEnabled = this.haDiscovery === true || this.haDiscovery === "true";
    if (!isEnabled) {
      return true;
    }

    return String(value || "").trim().length > 0;
  }

  RED.nodes.registerType("lsh-logic", {
    category: "function",
    color: "#4a90e2",
    defaults: {
      name: { value: "" },
      // MQTT Path Settings
      homieBasePath: { value: "homie/", required: true, validate: validateTopicBase },
      lshBasePath: { value: "LSH/", required: true, validate: validateTopicBase },
      serviceTopic: {
        value: "LSH/Node-RED/SRV",
        required: true,
        validate: validateRequiredTrimmed,
      },
      protocol: { value: "json", required: true },
      // Context Key Prefixes
      otherDevicesPrefix: {
        value: "other_devices",
        required: true,
        validate: validateRequiredTrimmed,
      },
      // File Config
      systemConfigPath: {
        value: "configs/system-config.json",
        required: true,
        validate: validateRequiredTrimmed,
      },
      // Context Export
      exposeStateContext: { value: "none", required: true },
      exposeStateKey: { value: "lsh_state", validate: validateExposeStateKey },
      exportTopics: { value: "flow", required: true },
      exportTopicsKey: { value: "lsh_topics", validate: validateExportTopicsKey },
      exposeConfigContext: { value: "none", required: true },
      exposeConfigKey: { value: "lsh_config", validate: validateExposeConfigKey },
      // Other Actors
      otherActorsContext: { value: "global", required: true },
      // Timing
      clickTimeout: {
        value: 2,
        required: true,
        validate: validatePositiveNumber,
      },
      clickCleanupInterval: {
        value: 30,
        required: true,
        validate: validatePositiveNumber,
      },
      watchdogInterval: {
        value: 60,
        required: true,
        validate: validatePositiveNumber,
      },
      interrogateThreshold: {
        value: 120,
        required: true,
        validate: validatePositiveNumber,
      },
      initialStateTimeout: {
        value: 2,
        required: true,
        validate: validatePositiveNumber,
      },
      pingTimeout: {
        value: 3,
        required: true,
        validate: validatePositiveNumber,
      },
      haDiscovery: { value: false },
      haDiscoveryPrefix: { value: "homeassistant", validate: validateDiscoveryPrefix },
    },
    inputs: 1,
    outputs: 5,
    icon: "font-awesome/fa-cogs",
    label: function () {
      return this.name || "LSH Logic";
    },
    oneditprepare: function () {
      const toggleRow = (inputSelector, rowSelector, isEnabled) => {
        const $row = $(rowSelector);
        const $input = $(inputSelector);
        $row.toggle(isEnabled);
        $input.prop("disabled", !isEnabled);
      };

      const refreshConditionalFields = () => {
        const haEnabled =
          $("#node-input-haDiscovery").prop("checked") === true ||
          $("#node-input-haDiscovery").val() === "true";
        toggleRow("#node-input-haDiscoveryPrefix", "#node-row-haDiscoveryPrefix", haEnabled);

        const exposeStateEnabled = $("#node-input-exposeStateContext").val() !== "none";
        toggleRow("#node-input-exposeStateKey", "#node-row-exposeStateKey", exposeStateEnabled);

        const exportTopicsEnabled = $("#node-input-exportTopics").val() !== "none";
        toggleRow("#node-input-exportTopicsKey", "#node-row-exportTopicsKey", exportTopicsEnabled);

        const exposeConfigEnabled = $("#node-input-exposeConfigContext").val() !== "none";
        toggleRow("#node-input-exposeConfigKey", "#node-row-exposeConfigKey", exposeConfigEnabled);

        const msgpackEnabled = $("#node-input-protocol").val() === "msgpack";
        $("#node-row-protocol-msgpack-tip").toggle(msgpackEnabled);
      };

      $("#node-input-haDiscovery").on("change", () => {
        refreshConditionalFields();
        $("#node-input-haDiscoveryPrefix").trigger("change");
      });

      $("#node-input-exposeStateContext").on("change", () => {
        refreshConditionalFields();
        $("#node-input-exposeStateKey").trigger("change");
      });

      $("#node-input-exportTopics").on("change", () => {
        refreshConditionalFields();
        $("#node-input-exportTopicsKey").trigger("change");
      });

      $("#node-input-exposeConfigContext").on("change", () => {
        refreshConditionalFields();
        $("#node-input-exposeConfigKey").trigger("change");
      });

      $("#node-input-protocol").on("change", refreshConditionalFields);

      refreshConditionalFields();
    },
    inputLabels: "MQTT Messages",
    outputLabels: ["LSH Commands", "Other Actor Commands", "Alerts", "Configuration", "Debug"],
  });
</script>

<!-- The Help tab documentation for the node -->
<script type="text/html" data-help-name="lsh-logic">
  <p>
    A powerful, all-in-one node that encapsulates the entire automation logic for an LSH (Labo Smart
    Home) style system. It replaces a complex flow of function nodes with a single, robust, and
    maintainable component built with TypeScript.
  </p>

  <h3>Core Features</h3>
  <ul>
    <li>
      <strong>Declarative System Configuration:</strong> Define all your system's devices in a
      single, clear <code>system-config.json</code> file. The node automatically hot-reloads the
      configuration when the file is modified.
    </li>
    <li>
      <strong>Centralized State Management:</strong> Maintains an in-memory registry of all device
      states, health status (connected, healthy, stale), and configurations. This state can be
      exposed to the context for easy debugging and dashboarding.
    </li>
    <li>
      <strong>Advanced Click Logic:</strong> Implements "long-click" (smart toggle) and
      "super-long-click" (turn all off) actions for devices that have buttons configured.
    </li>
    <li>
      <strong>Reliable Network Protocol:</strong> Uses a two-phase commit protocol for network-based
      button clicks to ensure commands are not lost, even on unreliable networks.
    </li>
    <li>
      <strong>Intelligent Watchdog:</strong> Actively monitors device health using a combination of
      passive (Homie <code>$state</code>) and active (LSH ping) checks. It uses a smart initial
      verification process to quickly and accurately detect offline devices at startup. Retained
      snapshots accelerate recovery, but live reachability still comes only from fresh Homie or LSH
      traffic, preventing false alarms and alert spam.
    </li>
    <li>
      <strong>Dynamic Topic Management:</strong> Emits messages on a dedicated output to dynamically
      configure an <code>mqtt-in</code> node, automatically managing topic subscriptions and
      unsubscriptions as your system configuration changes.
    </li>
  </ul>

  <h3>Inputs</h3>
  <dl class="message-properties">
    <dt>MQTT Messages</dt>
    <dd>
      The node determines which topics to listen to based on your configuration. You do not need to
      manually subscribe. Instead, connect the node's
      <strong>Configuration</strong> output to an <code>mqtt-in</code> node to complete the setup.
    </dd>
  </dl>
  <p>
    Device <code>misc</code> topics may also carry bridge-local diagnostics emitted by
    <code>lsh-bridge</code>. The node accepts those payloads as informational runtime events, but it
    does not treat them as click traffic or as proof that the device is currently reachable.
  </p>

  <h3>Outputs</h3>
  <ol style="margin-bottom: 20px;">
    <li>
      <b>LSH Commands:</b> Outputs MQTT messages for devices using the LSH protocol. This includes
      actuator state commands (<code>SET_STATE</code>, <code>SET_SINGLE_ACTUATOR</code>), network
      click acknowledgements (<code>NETWORK_CLICK_ACK</code>), failovers (<code>FAILOVER</code>,
      <code>FAILOVER_CLICK</code>), and watchdog pings (<code>PING</code>).
    </li>
    <li>
      <b>Other Actor Commands:</b> Outputs generic commands intended for external, non-LSH devices
      (e.g., Tasmota, Zigbee2MQTT). The message payload is an object containing the target actor
      names and the desired boolean state (<code>true</code>/<code>false</code>).
    </li>
    <li>
      <b>Alerts:</b> Outputs formatted, human-readable alert messages when a device's health status
      changes (e.g., goes offline or comes back online). Alerts for "back online" are suppressed
      during the initial startup period to avoid notification noise.
    </li>
    <li>
      <b>Configuration:</b> Outputs specially crafted messages to dynamically control the
      subscriptions of an <code>mqtt-in</code> node. This is the key to a fully automated and
      self-configuring system.
    </li>
    <li>
      <b>Debug:</b> Forwards the original, unprocessed input message for logging and debugging
      purposes.
    </li>
  </ol>

  <h3>Node Configuration</h3>
  <dl class="message-properties">
    <dt>MQTT Path Settings</dt>
    <dd>
      Defines the base MQTT paths for all topics the node interacts with. These must match your
      system's topic structure (e.g., <code>homie/</code>, <code>LSH/</code>).
    </dd>

    <dt>System Config</dt>
    <dd>
      Specifies the path to your <code>system-config.json</code> file, relative to your Node-RED
      user directory (e.g., <code>~/.node-red/configs/</code>). This file is the single source of
      truth for all devices managed by the node.
    </dd>

    <dt>Context Interaction</dt>
    <dd>
      Allows the node to share its internal state (device registry) and configuration with the rest
      of the flow via flow or global context variables. This is useful for building dashboards or
      for advanced debugging.
    </dd>

    <dt>Timing Settings</dt>
    <dd>
      Allows you to fine-tune all system timeouts and intervals. The
      <code>Initial Replay Window</code> is particularly important: it defines how long the node
      waits only when the startup bridge-local <code>BOOT</code> replay is needed because at least
      one configured device is still missing an authoritative <code>conf</code> or
      <code>state</code> snapshot. If snapshots are already complete, the node skips the replay and
      proceeds directly to targeted recovery requests and pings.
    </dd>
  </dl>

  <h3>Startup Semantics</h3>
  <p>
    Startup intentionally separates <strong>snapshot availability</strong> from
    <strong>device health</strong>.
  </p>
  <ul>
    <li>
      Retained <code>conf</code> and <code>state</code> are reused as the last known authoritative
      topology/state snapshots.
    </li>
    <li>
      Retained snapshots do <strong>not</strong> mark a device as connected, healthy, or freshly
      reachable.
    </li>
    <li>
      Current reachability only comes from live Homie <code>$state=ready</code>, live LSH traffic,
      or a successful watchdog <code>PING</code> response.
    </li>
    <li>
      If a device is offline during startup, it is recovered automatically later when it sends live
      traffic again; the node will request only the missing snapshot pieces at that moment.
    </li>
  </ul>

  <h3>Best Practices</h3>
  <h4>Dynamic MQTT Subscriptions</h4>
  <p>
    The most powerful way to use this node is to let it manage your MQTT subscriptions
    automatically. This creates a "zero-maintenance" flow that adapts as you add or remove devices
    from your `system-config.json`.
  </p>
  <p>
    <strong
      >Connect the 4th output ("Configuration") directly to a single
      <code>mqtt-in</code> node.</strong
    >
  </p>
  <p>
    When the flow is deployed or when the configuration file changes, the `lsh-logic` node will send
    a sequence of messages to the `mqtt-in` node to first
    <strong>unsubscribe from all</strong> previous topics and then
    <strong>subscribe to the new, correct list of topics</strong>. This ensures your system is
    always listening to exactly the right channels without any manual intervention.
  </p>

  <h4>Configuration File Management</h4>
  <ul>
    <li>
      <strong>User Directory:</strong> It is highly recommended to place your
      <code>system-config.json</code> file within a sub-directory of your Node-RED user directory
      (e.g., <code>~/.node-red/configs/</code>). This ensures your configuration is portable and
      included in standard backups of your Node-RED environment.
    </li>
    <li>
      <strong>Device Definitions:</strong> Every device that the system should be aware of, even if
      it's just a simple light (an "actor"), must have an entry with its <code>name</code> in the
      `system-config.json` file. The button-related properties (<code>longClickButtons</code>, etc.)
      are entirely optional.
    </li>
  </ul>

  <h4>Debugging</h4>
  <ul>
    <li>
      Use the "Export Internal State" option to expose the live device registry to a flow or global
      context variable. You can then connect a
      <code>inject</code> node to a <code>debug</code> node to inspect the full system state at any
      time.
    </li>
    <li>
      The "Debug" output of this node will pass through any message it receives, allowing you to see
      the raw data before it's processed.
    </li>
  </ul>

  <h4>Advanced Usage: Using MsgPack</h4>
  <p>
    This node supports both JSON (default) and MsgPack for payload encoding and decoding, which can
    significantly reduce network traffic.
  </p>
  <p><b>Sending Commands (Output):</b></p>
  <p>
    In the node's configuration panel, you can set the <b>LSH Protocol</b> to "MsgPack". When this
    is selected, all commands sent from the <b>LSH Commands</b> output will have their payloads
    automatically encoded as MsgPack. Your LSH devices must be programmed to decode MsgPack payloads
    on their `.../IN` topic.
  </p>
  <p><b>Receiving Messages (Input):</b></p>
  <p>
    The node automatically detects and decodes incoming MsgPack payloads. To make this work, you
    must configure the <code>mqtt-in</code> node that feeds messages into this node:
  </p>
  <ul>
    <li>
      In the <code>mqtt-in</code> node settings, set the "Output" option to <b>"a Buffer"</b>.
    </li>
  </ul>
</script>
