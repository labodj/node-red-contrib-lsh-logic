<!-- Node-RED Registration Script -->
<script type="text/javascript">
  const validatePositiveNumber = (value) => {
    const numericValue = Number(value);
    return Number.isFinite(numericValue) && numericValue > 0;
  };

  const validateRequiredTrimmed = (value) => String(value || "").trim().length > 0;

  const validateTopicBase = (value) => {
    const normalized = String(value || "").trim();
    if (normalized.length === 0 || !normalized.endsWith("/")) {
      return false;
    }

    const topicBody = normalized.slice(0, -1);
    if (topicBody.length === 0 || /[+#]/.test(normalized)) {
      return false;
    }

    return topicBody.split("/").every((segment) => segment.length > 0);
  };

  const validateConcreteTopic = (value) => {
    const normalized = String(value || "").trim();
    if (normalized.length === 0 || normalized.endsWith("/") || /[+#]/.test(normalized)) {
      return false;
    }

    return normalized.split("/").every((segment) => segment.length > 0);
  };

  function validateContextBackedKey(value, contextFieldName) {
    const contextValue = this[contextFieldName];
    if (contextValue === "none") {
      return true;
    }
    return validateRequiredTrimmed(value);
  }

  function validateExposeStateKey(value) {
    return validateContextBackedKey.call(this, value, "exposeStateContext");
  }

  function validateExportTopicsKey(value) {
    return validateContextBackedKey.call(this, value, "exportTopics");
  }

  function validateExposeConfigKey(value) {
    return validateContextBackedKey.call(this, value, "exposeConfigContext");
  }

  const validateSystemConfigJson = (value) => {
    try {
      const parsed = JSON.parse(String(value || ""));
      return parsed && typeof parsed === "object" && Array.isArray(parsed.devices);
    } catch (_error) {
      return false;
    }
  };

  RED.nodes.registerType("lsh-logic", {
    category: "function",
    color: "#4a90e2",
    defaults: {
      name: { value: "" },
      // MQTT Path Settings
      homieBasePath: { value: "homie/5/", required: true, validate: validateTopicBase },
      lshBasePath: { value: "LSH/", required: true, validate: validateTopicBase },
      serviceTopic: {
        value: "LSH/Node-RED/SRV",
        required: true,
        validate: validateConcreteTopic,
      },
      protocol: { value: "json", required: true },
      // Context Key Prefixes
      otherDevicesPrefix: {
        value: "other_devices",
        required: true,
        validate: validateRequiredTrimmed,
      },
      // Inline Config
      systemConfigJson: {
        value: '{\n  "devices": []\n}',
        required: true,
        validate: validateSystemConfigJson,
      },
      // Context Export
      exposeStateContext: { value: "none", required: true },
      exposeStateKey: { value: "lsh_state", validate: validateExposeStateKey },
      exportTopics: { value: "flow", required: true },
      exportTopicsKey: { value: "lsh_topics", validate: validateExportTopicsKey },
      exposeConfigContext: { value: "none", required: true },
      exposeConfigKey: { value: "lsh_config", validate: validateExposeConfigKey },
      // Other Actors
      otherActorsContext: { value: "global", required: true },
      // Timing
      clickTimeout: {
        value: 2,
        required: true,
        validate: validatePositiveNumber,
      },
      clickCleanupInterval: {
        value: 30,
        required: true,
        validate: validatePositiveNumber,
      },
      watchdogInterval: {
        value: 60,
        required: true,
        validate: validatePositiveNumber,
      },
      interrogateThreshold: {
        value: 120,
        required: true,
        validate: validatePositiveNumber,
      },
      initialStateTimeout: {
        value: 2,
        required: true,
        validate: validatePositiveNumber,
      },
      pingTimeout: {
        value: 3,
        required: true,
        validate: validatePositiveNumber,
      },
    },
    inputs: 1,
    outputs: 5,
    icon: "font-awesome/fa-cogs",
    label: function () {
      return this.name || "LSH Logic";
    },
    oneditprepare: function () {
      const toggleRow = (inputSelector, rowSelector, isEnabled) => {
        const $row = $(rowSelector);
        const $input = $(inputSelector);
        $row.toggle(isEnabled);
        $input.prop("disabled", !isEnabled);
      };

      const refreshConditionalFields = () => {
        const exposeStateEnabled = $("#node-input-exposeStateContext").val() !== "none";
        toggleRow("#node-input-exposeStateKey", "#node-row-exposeStateKey", exposeStateEnabled);

        const exportTopicsEnabled = $("#node-input-exportTopics").val() !== "none";
        toggleRow("#node-input-exportTopicsKey", "#node-row-exportTopicsKey", exportTopicsEnabled);

        const exposeConfigEnabled = $("#node-input-exposeConfigContext").val() !== "none";
        toggleRow("#node-input-exposeConfigKey", "#node-row-exposeConfigKey", exposeConfigEnabled);

        const msgpackEnabled = $("#node-input-protocol").val() === "msgpack";
        $("#node-row-protocol-msgpack-tip").toggle(msgpackEnabled);
      };

      $("#node-input-exposeStateContext").on("change", () => {
        refreshConditionalFields();
        $("#node-input-exposeStateKey").trigger("change");
      });

      $("#node-input-exportTopics").on("change", () => {
        refreshConditionalFields();
        $("#node-input-exportTopicsKey").trigger("change");
      });

      $("#node-input-exposeConfigContext").on("change", () => {
        refreshConditionalFields();
        $("#node-input-exposeConfigKey").trigger("change");
      });

      $("#node-input-protocol").on("change", refreshConditionalFields);

      refreshConditionalFields();
    },
    inputLabels: "MQTT Messages",
    outputLabels: ["LSH Commands", "Other Actor Commands", "Alerts", "Configuration", "Debug"],
  });
</script>

<!-- The Help tab documentation for the node -->
<script type="text/html" data-help-name="lsh-logic">
  <p>
    Runtime orchestrator for an LSH-compatible smart home. It listens to the public LSH MQTT
    contract, keeps the live device registry, coordinates distributed click actions, emits commands,
    watches device health and reports alerts.
  </p>
  <p>
    The node is LSH-oriented, not a generic MQTT automation block. Devices must speak the LSH
    protocol. Non-LSH devices can still be controlled through output 2, where your surrounding
    Node-RED flow translates abstract actor commands to Zigbee, Tasmota, Home Assistant or any other
    integration.
  </p>

  <h3>Recommended Wiring</h3>
  <ol>
    <li>Wire a dedicated <code>mqtt in</code> node to this node.</li>
    <li>Wire output 1, <b>LSH Commands</b>, to <code>mqtt out</code>.</li>
    <li>Wire output 4, <b>Configuration</b>, back to the same <code>mqtt in</code> node.</li>
    <li>Leave that <code>mqtt in</code> topic empty when using dynamic subscriptions.</li>
  </ol>
  <p>
    The fourth output sends Node-RED MQTT subscription-control messages. When the inline config is
    deployed, the node updates the MQTT input with the exact topic set needed by the configured
    devices.
  </p>

  <h3>Inputs</h3>
  <p>The input accepts MQTT messages for configured LSH devices:</p>
  <ul>
    <li><code>&lt;lshBasePath&gt;&lt;device&gt;/conf</code>: retained topology snapshot.</li>
    <li><code>&lt;lshBasePath&gt;&lt;device&gt;/state</code>: retained actuator state snapshot.</li>
    <li>
      <code>&lt;lshBasePath&gt;&lt;device&gt;/events</code>: controller-backed runtime events.
    </li>
    <li><code>&lt;lshBasePath&gt;&lt;device&gt;/bridge</code>: bridge-local runtime events.</li>
    <li><code>&lt;homieBasePath&gt;&lt;device&gt;/$state</code>: Homie lifecycle.</li>
  </ul>
  <p>
    Retained <code>conf</code> and <code>state</code> are reused as authoritative snapshots.
    Retained <code>events</code> and <code>bridge</code> are ignored because they are runtime-only
    signals.
  </p>

  <h3>Outputs</h3>
  <ol>
    <li>
      <b>LSH Commands:</b> MQTT messages for LSH devices, including state commands, network-click
      acknowledgements, failovers and watchdog pings.
    </li>
    <li>
      <b>Other Actor Commands:</b> generic commands for external targets. The payload carries actor
      names and desired boolean state; your flow decides how to control those actors.
    </li>
    <li>
      <b>Alerts:</b> formatted human-readable alerts plus structured fields such as
      <code>event_type</code> and <code>event_source</code>.
    </li>
    <li>
      <b>Configuration:</b> MQTT subscription-control messages for the upstream
      <code>mqtt in</code> node.
    </li>
    <li><b>Debug:</b> original input passthrough.</li>
  </ol>

  <h3>System Configuration</h3>
  <p>
    The inline JSON configuration is the runtime source of truth. It lists the devices known by the
    node and optional long-click or super-long-click actions.
  </p>
  <pre><code>{
  "devices": [
    {
      "name": "c1",
      "longClickButtons": [
        {
          "id": 1,
          "actors": [
            {
              "name": "j1",
              "allActuators": true,
              "actuators": []
            }
          ],
          "otherActors": ["zigbee_table_lamp"]
        }
      ]
    },
    {
      "name": "j1"
    }
  ]
}</code></pre>
  <p>
    Device names must match MQTT device IDs exactly. Button action targets under
    <code>actors</code> must reference configured LSH devices. Targets under
    <code>otherActors</code> are emitted on output 2 for your own flows.
  </p>

  <h3>Node Settings</h3>
  <dl class="message-properties">
    <dt>MQTT &amp; protocol settings</dt>
    <dd>
      Set the Homie lifecycle base path, LSH topic base path, bridge service topic and payload
      format. Base paths must end with <code>/</code> and must not contain MQTT wildcards. The
      service topic must be a concrete publish topic.
    </dd>

    <dt>System Config</dt>
    <dd>Inline JSON device/action configuration embedded directly in the Node-RED flow.</dd>

    <dt>Timing Settings</dt>
    <dd>
      Tune click timeouts, startup replay window and watchdog probing. Defaults are conservative;
      change them only when you know your bridge/controller timing.
    </dd>

    <dt>Context Interaction</dt>
    <dd>
      Optional exports for the live device registry, generated MQTT topic set and effective runtime
      config. Useful for dashboards and debugging.
    </dd>
  </dl>

  <h3>Startup and Recovery</h3>
  <p>
    Startup separates last known snapshots from current reachability. Retained
    <code>conf</code> and <code>state</code> accelerate recovery, but a device becomes currently
    reachable only after live Homie lifecycle traffic, live LSH traffic or a successful watchdog
    ping response.
  </p>
  <p>
    If all configured devices already have complete retained snapshots, the startup
    <code>BOOT</code> replay is skipped. If something is missing, the node requests one bridge-local
    replay, then asks only for the missing pieces and pings still-unreachable devices. Watchdog
    recovery alerts are suppressed during warm-up.
  </p>
  <p>
    If the inline config is invalid, deployment fails fast with a clear node configuration error.
  </p>

  <h3>Home Assistant Discovery</h3>
  <p>
    This node intentionally does not generate Home Assistant MQTT discovery. Use
    <code>node-red-contrib-homie-home-assistant-discovery</code> beside it. Keep a separate MQTT
    input for discovery metadata if that node also manages subscriptions dynamically.
  </p>

  <h3>MsgPack</h3>
  <p>
    JSON is the default. To use MsgPack, set <b>LSH Protocol</b> to <b>MsgPack</b> and configure the
    upstream <code>mqtt in</code> node to output <b>a Buffer</b>. Non-Buffer inbound LSH payloads
    are rejected in MsgPack mode.
  </p>
</script>
