<!-- Node-RED Registration Script -->
<script type="text/javascript">
  (function () {
    const validateRequiredTrimmed = (value) => String(value || "").trim().length > 0;
    const validateNonNegativeNumber = (value) => {
      const numericValue = Number(value);
      return Number.isFinite(numericValue) && numericValue >= 0;
    };

    RED.nodes.registerType("lsh-external-state", {
      category: "home automation",
      color: "#4a90e2",
      defaults: {
        name: { value: "" },
        storeContext: { value: "global", required: true },
        prefixSource: { value: "config", required: true },
        prefix: { value: "other_devices" },
        configContext: { value: "global", required: true },
        configKey: { value: "lsh_config", required: true, validate: validateRequiredTrimmed },
        actorNameSource: { value: "msg", required: true },
        actorName: { value: "" },
        actorNameProperty: { value: "topic" },
        stateProperty: { value: "payload", required: true, validate: validateRequiredTrimmed },
        trueValues: { value: "1,true,on,yes,open,active" },
        falseValues: { value: "0,false,off,no,closed,inactive" },
        caseSensitive: { value: false },
        invert: { value: false },
        acceptRetained: { value: true },
        storeOnlyChanges: { value: true },
        storeMetadata: { value: true },
        configWaitTimeoutMs: {
          value: 5000,
          required: true,
          validate: validateNonNegativeNumber,
        },
      },
      inputs: 1,
      outputs: 1,
      icon: "font-awesome/fa-database",
      label: function () {
        return this.name || "LSH External State";
      },
      inputLabels: "External actor state",
      outputLabels: ["Stored normalized state"],
      oneditprepare: function () {
        const toggleRow = (rowSelector, isEnabled) => {
          $(rowSelector).toggle(isEnabled);
        };
        const refreshPrefixRows = () => {
          const fromConfig = $("#node-input-prefixSource").val() === "config";
          toggleRow(".lsh-external-config-prefix", fromConfig);
          toggleRow(".lsh-external-manual-prefix", !fromConfig);
        };
        const refreshActorRows = () => {
          const fromMessage = $("#node-input-actorNameSource").val() === "msg";
          toggleRow(".lsh-external-msg-actor", fromMessage);
          toggleRow(".lsh-external-fixed-actor", !fromMessage);
        };

        $("#node-input-acceptRetained").val(String(this.acceptRetained ?? true));
        $("#node-input-prefixSource").on("change", refreshPrefixRows);
        $("#node-input-actorNameSource").on("change", refreshActorRows);
        refreshPrefixRows();
        refreshActorRows();
      },
    });
  })();
</script>

<!-- Help tab documentation -->
<script type="text/html" data-help-name="lsh-external-state">
  <p>
    Stores external actor state in Node-RED context so <code>lsh-logic</code> can include those
    actors when it decides smart-toggle direction.
  </p>

  <h3>What It Writes</h3>
  <p>
    The coordinator reads boolean states from
    <code>&lt;prefix&gt;.&lt;actor&gt;.state</code>. With the default prefix and actor
    <code>bedside_lamp</code>, this helper writes:
  </p>
  <pre>other_devices.bedside_lamp.state = true</pre>

  <p>
    When metadata is enabled, it also writes <code>updatedAt</code>, <code>sourceTopic</code>,
    <code>rawState</code> and <code>retain</code> next to the state. The coordinator ignores these
    metadata fields; they are for diagnostics and user flows.
  </p>

  <h3>Configuration</h3>
  <dl class="message-properties">
    <dt>External State Store</dt>
    <dd>Context store used by the target <code>lsh-logic</code> node for external actor reads.</dd>
    <dt>Prefix</dt>
    <dd>
      Read <code>otherDevicesPrefix</code> from the exported <code>lsh_config</code>, or set a
      manual prefix such as <code>other_devices</code>.
    </dd>
    <dt>Actor Name</dt>
    <dd>
      Use a fixed actor name for one-device flows, or read it from a message property such as
      <code>topic</code>.
    </dd>
    <dt>State Property</dt>
    <dd>
      Message property containing the external state. Common values are <code>payload</code>,
      <code>payload.state</code> for ESPHome/Zigbee2MQTT, and <code>payload.ison</code> for Shelly.
    </dd>
  </dl>

  <h3>State Parsing</h3>
  <p>
    Boolean and numeric <code>1/0</code> values are accepted directly. Text values are compared
    against the configured true/false lists. Defaults cover common ON/OFF payloads:
    <code>on/off</code>, <code>true/false</code>, <code>yes/no</code>, <code>1/0</code>,
    <code>open/closed</code> and <code>active/inactive</code>.
  </p>
  <p>
    Invalid, missing or ambiguous states are dropped with a warning. They are never silently turned
    into <code>false</code>.
  </p>

  <h3>Retained Messages</h3>
  <p>
    Retained MQTT messages are accepted by default because this node stores observed state only.
    This helps rebuild external actor state after a Node-RED restart. Disable it only when retained
    messages from that integration are known to be stale or misleading.
  </p>

  <h3>Startup Order</h3>
  <p>
    When the prefix comes from the exported <code>lsh_config</code>, the helper keeps the latest
    state per actor while that config export is not ready. It retries until
    <b>Context Ready Wait</b> expires. Set the wait to <code>0</code> for fail-fast behavior.
  </p>

  <h3>Multiple Instances</h3>
  <p>
    Multiple <code>lsh-external-state</code> nodes can run side by side. They do not share hidden
    state; each accepted message writes only the selected context, prefix and actor name. This is
    useful when different integrations need different State Property, true/false lists, retained
    policy, metadata policy, or fixed actor names.
  </p>
  <p>
    Avoid writing the same actor under the same context and prefix from two helpers unless that is
    deliberate. In that case the last accepted update wins.
  </p>

  <h3>Outputs</h3>
  <p>
    When a state is stored, the node emits a normalized message with <code>msg.topic</code> set to
    the actor name, <code>msg.payload</code> set to the boolean state and
    <code>msg.lshExternalState</code> containing diagnostics. Wire it to Debug if you want
    visibility, or leave the output unwired for store-only use.
  </p>
</script>
