# Name of the workflow, which will be displayed on the GitHub "Actions" tab.
name: Node.js CI & Test

# Controls when the workflow will run.
on:
  # Triggers the workflow on push events but only for the main branch.
  push:
    branches: [main, master]
    tags:
      - "v*"

  # Triggers the workflow on pull request events to the main branch.
  pull_request:
    branches: [main, master]

# Required permissions for OIDC (Trusted Publishing)
permissions:
  id-token: write
  contents: read

jobs:
  # This job is named "build-and-test".
  build-and-test:
    # The type of runner that the job will run on.
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Run tests
        run: npm test

  publish:
    needs: build-and-test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Install latest npm
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build --if-present

      - name: Publish to npm
        # npm 11.5.1+ (installed via @latest) will automatically use OIDC
        run: npm publish
